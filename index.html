<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Windows Error </title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bsod:#0827c7;}
body{background:var(--bsod);color:#fff;font-family:"Lucida Console","Courier New",monospace;min-height:100vh;overflow:hidden;}
.screen{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;padding:8vw;}
.hidden{display:none;}
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:5;background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0,rgba(0,0,0,0) 2px,rgba(0,0,0,.06) 3px);animation:flicker 1s infinite;}
@keyframes flicker{0%,100%{opacity:.5}48%{opacity:.55}50%{opacity:.35}52%{opacity:.55}}
.frown{font-size:64px;margin-bottom:24px;animation:pop .6s ease-out;}
@keyframes pop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.line{font-size:clamp(15px,2.2vw,22px);line-height:1.6;max-width:800px;opacity:0;animation:typein .9s forwards;}
.line:nth-of-type(2){animation-delay:.6s}
.line:nth-of-type(3){animation-delay:.1s}
@keyframes typein{to{opacity:1}}
.pct{margin-top:28px;font-size:clamp(15px,2.2vw,22px);}
.bar{margin-top:10px;width:min(320px,80vw);height:14px;border:1px solid rgba(255,255,255,.5);}
.bar span{display:block;height:100%;width:0;background:#fff;animation:fill 4s ease-in-out infinite;}
@keyframes fill{0%{width:0}60%{width:73%}80%{width:74%}100%{width:73%}}
.qr{font-size:clamp(33px,1.8vw,16px);margin-top:32px;opacity:.85;}
.hint{position:fixed;bottom:16px;left:16px;font-size:22px; font-weight:bold ;opacity:.6;z-index:6;}
.badge{position:fixed;bottom:16px;right:16px;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.4);padding:8px 14px;font-size:12px;letter-spacing:.5px;border-radius:4px;z-index:6;}
#gotcha{background:var(--bsod);color:#fff}
#gotcha .big{font-size:clamp(40px,9vw,120px);font-weight:bold;color:#fcfcfc;animation:pop .6s ease-out;}
#gotcha .sub{font-size:clamp(16px,2.5vw,26px);margin-top:20px;line-height:1.5;}
.btn{margin-top:36px;background:#fff;color:#111;border:none;padding:14px 28px;font-family:inherit;font-size:16px;border-radius:6px;cursor:pointer;}
.btn:hover{background:#4ade80;}
</style>
</head>
<body>

<div id="bsod" class="screen">
    <div class="frown">:(</div>
    <div class="line">DRIVER_UNLOADED_WITHOUT_CANCELLING_PENDING_OPERATIONS.</div>
    <div class="line">We're just collecting some ERROR info...</div>
    <div class="pct">0% complete</div>
    <div class="bar"><span></span></div>
    <div class="qr">Stop code: BLUE SCREEN ERROR 0x000000CE </div>
    <div class="qr"> CONTACT : +1 202 417 7689 </div>
</div>

<div id="gotcha" class="screen hidden">
    <div class="big">ERROR..</div>
    <div class="sub">THE SYSTEM FAILED TO LOAD.</div>
    <button class="btn" onclick="replay()">RETRY </button>
</div>

<div class="hint">CONTACT THE SUPPORT AGENT : +1 202 417 7689 </div>
<div class="badge">system error : SYSTEM DRIVERS DAMAGED </div>

<script>
const bsod = document.getElementById('bsod');
const gotcha = document.getElementById('gotcha');
const pct = document.querySelector('.pct');
let pctTimer, revealTimer;
function start(){
    bsod.classList.remove('hidden');
    gotcha.classList.add('hidden');
    pctTimer = setInterval(()=>{ pct.textContent = (Math.floor(Math.random()*30)+60) + '% complete'; }, 1200);
    revealTimer = setTimeout(()=>{
        clearInterval(pctTimer);
        bsod.classList.add('hidden');
        gotcha.classList.remove('hidden');
    }, 5000);
}
function replay(){ clearTimeout(revealTimer); clearInterval(pctTimer); start(); }
document.body.addEventListener('click', (e)=>{
    if(e.target.classList.contains('btn')) return;
    if(!document.fullscreenElement){ document.documentElement.requestFullscreen?.().catch(()=>{}); }
});
start();
</script>
</body>
</html>
